<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })">
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <!-- Provider Selection -->
  <hbox align="center">
    <label value="LLM 服务商" style="min-width:120px" />
    <html:select id="zotero-prefpane-__addonRef__-provider" preference="provider" style="flex:1">
      <html:option value="minimax">MiniMax</html:option>
      <html:option value="kimi">Kimi (Moonshot)</html:option>
      <html:option value="deepseek">DeepSeek</html:option>
      <html:option value="openrouter">OpenRouter</html:option>
      <html:option value="openai">OpenAI Compatible</html:option>
    </html:select>
  </hbox>

  <!-- API Key -->
  <hbox align="center">
    <label value="API Key" style="min-width:120px" />
    <html:input type="password" id="zotero-prefpane-__addonRef__-apikey" preference="apikey" placeholder="sk-..." style="flex:1" />
  </hbox>

  <!-- Model Selection -->
  <hbox align="center">
    <label value="模型" style="min-width:120px" />
    <html:select id="zotero-prefpane-__addonRef__-model" preference="model" style="flex:1">
      <!-- MiniMax Models -->
      <html:option value="MiniMax-Text-01">MiniMax-Text-01 (默认)</html:option>
      <html:option value="abab6.5s-chat">abab6.5s-chat</html:option>
      <html:option value="abab6.5-chat">abab6.5-chat</html:option>
      <!-- Kimi Models -->
      <html:option value="kimi-k2.6">kimi-k2.6 (最新)</html:option>
      <html:option value="kimi-k2.5">kimi-k2.5</html:option>
      <html:option value="kimi-k2">kimi-k2</html:option>
      <html:option value="moonshot-v1-128k">moonshot-v1-128k</html:option>
      <!-- DeepSeek Models -->
      <html:option value="deepseek-v4-pro">deepseek-v4-pro (最新)</html:option>
      <html:option value="deepseek-v4-flash">deepseek-v4-flash</html:option>
      <html:option value="deepseek-v3.2">deepseek-v3.2</html:option>
      <html:option value="deepseek-r1">deepseek-r1 (推理)</html:option>
      <html:option value="deepseek-chat">deepseek-chat</html:option>
      <!-- OpenRouter Models -->
      <html:option value="anthropic/claude-sonnet-4.6">Claude Sonnet 4.6 (最新)</html:option>
      <html:option value="anthropic/claude-opus-4.7">Claude Opus 4.7</html:option>
      <html:option value="anthropic/claude-opus-4.5">Claude Opus 4.5</html:option>
      <html:option value="google/gemini-2.5-pro">Gemini 2.5 Pro</html:option>
      <html:option value="google/gemini-3.1-pro-preview">Gemini 3.1 Pro (预览)</html:option>
      <html:option value="openai/gpt-5.5-pro">GPT-5.5 Pro</html:option>
      <html:option value="openai/gpt-5.4-pro">GPT-5.4 Pro</html:option>
      <html:option value="x-ai/grok-4.3">Grok 4.3</html:option>
      <html:option value="qwen/qwen3.6-max-preview">Qwen 3.6 Max</html:option>
      <html:option value="mistralai/mistral-large-2512">Mistral Large</html:option>
      <!-- OpenAI Compatible -->
      <html:option value="gpt-5.5-pro">GPT-5.5 Pro</html:option>
      <html:option value="gpt-5.4-pro">GPT-5.4 Pro</html:option>
      <html:option value="gpt-5.4-mini">GPT-5.4 Mini</html:option>
      <html:option value="o3">o3 (推理)</html:option>
      <html:option value="o3-mini">o3-mini</html:option>
      <!-- Custom -->
      <html:option value="custom">✏️ 自定义模型...</html:option>
    </html:select>
  </hbox>

  <!-- Custom Model Input (hidden by default) -->
  <hbox align="center" id="zotero-prefpane-__addonRef__-custom-model-row" style="display:none; margin-top:4px;">
    <html:label style="min-width:120px;">自定义模型：</html:label>
    <html:input type="text" id="zotero-prefpane-__addonRef__-custom-model" placeholder="输入模型ID" style="flex:1" />
  </hbox>

  <!-- Base URL -->
  <hbox align="center">
    <label value="Base URL" style="min-width:120px" />
    <html:input type="text" id="zotero-prefpane-__addonRef__-baseurl" preference="baseurl" placeholder="留空使用默认地址" style="flex:1" />
  </hbox>

  <!-- Wiki Output Path -->
  <hbox align="center">
    <label value="输出路径" style="min-width:120px" />
    <html:input type="text" id="zotero-prefpane-__addonRef__-wikipath" preference="wikipath" placeholder="E:\Obsidian\vault\wiki" style="flex:1" />
    <html:button id="zotero-prefpane-__addonRef__-browse-btn" style="margin-left:8px;">浏览…</html:button>
  </hbox>

  <!-- Max Characters -->
  <hbox align="center">
    <label value="最大字符数" style="min-width:120px" />
    <html:input type="number" id="zotero-prefpane-__addonRef__-maxchars" preference="maxchars" style="flex:1" />
  </hbox>

  <!-- Language -->
  <hbox align="center">
    <label value="语言" style="min-width:120px" />
    <html:select id="zotero-prefpane-__addonRef__-language" preference="language" style="flex:1">
      <html:option value="zh">中文</html:option>
      <html:option value="en">English</html:option>
    </html:select>
  </hbox>

  <!-- Test Connection Button -->
  <hbox align="center" style="margin-top:8px;">
    <spacer style="flex:1" />
    <html:button id="zotero-prefpane-__addonRef__-test-btn" style="padding:6px 20px;">🔌 检测模型可用性</html:button>
    <spacer style="flex:1" />
  </hbox>

  <!-- Save Button -->
  <hbox align="center" style="margin-top:8px;">
    <spacer style="flex:1" />
    <html:button id="zotero-prefpane-__addonRef__-save-btn" style="padding:6px 20px; font-weight:bold;">💾 保存参数</html:button>
    <spacer style="flex:1" />
  </hbox>
</groupbox>

<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
